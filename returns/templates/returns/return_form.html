<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            max-width: 1100px;
            margin: auto;
            padding: 20px;
            border-radius: 12px;
        }

        h1 {
            color: #0B4C6F;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        .field label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }

        input, select, textarea {
            padding: 9px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .full {
            grid-column: span 3;
        }

        .actions {
            margin-top: 22px;
        }

        button {
            background: #2E7D32;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
        }

        .back {
            margin-left: 10px;
            color: #0B4C6F;
            text-decoration: none;
            font-weight: bold;
        }

        .error {
            color: #C62828;
            font-size: 12px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>{{ title }}</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="grid">
            {% for field in form %}
                <div class="field {% if field.name == 'observaciones' %}full{% endif %}">
                    <label>{{ field.label }}</label>
                    {{ field }}

                    {% if field.errors %}
                        <div class="error">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
        </div>

        <div class="actions">
            <button type="submit">Guardar devolución</button>
            <a href="{% url 'returns:return_list' %}" class="back">Volver</a>
        </div>
    </form>
</div>

</body>
</html>
